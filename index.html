<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>MAGIC – AR video screens</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

  <!-- 🎬 VIDEO (nascosti) -->
  <video id="video1" src="videos/video1.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video2" src="videos/video2.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video3" src="videos/video3.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video4" src="videos/video4.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video5" src="videos/video5.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video6" src="videos/video6.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video7" src="videos/video7.mp4" loop muted playsinline crossorigin="anonymous"></video>
  <video id="video8" src="videos/video8.mp4" loop muted playsinline crossorigin="anonymous"></video>

  <a-scene
    embedded
    arjs="trackingMethod: best; sourceType: webcam;"
    vr-mode-ui="enabled: false"
  >

    <!-- 🔵 MARKER HIRO -->
    <a-marker preset="hiro" id="marker">

      <a-entity
        id="magicModel"
        gltf-model="models/model.glb"
        scale="1.5 1.5 1.5"
        position="0 0 0"
        rotation="0 0 0"
        visible="false">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
